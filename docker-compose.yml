# ============================================
# AgroHub - Docker Compose Configuration
# ============================================

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-agrohub_production}
      POSTGRES_USER: ${DB_USER:-agrohub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-agrohub_user} -d ${DB_NAME:-agrohub_production}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agrohub_network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    command: >-
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - agrohub_network

  # ============================================
  # Django Application (Gunicorn)
  # ============================================
  web:
    image: agrohub-web:latest
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - logs_data:/app/logs
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agrohub_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-agrohub_production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?ALLOWED_HOSTS is required}
      DB_NAME: ${DB_NAME:-agrohub_production}
      DB_USER: ${DB_USER:-agrohub_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY: "True"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@agrohub.unirv.edu.br}
      SITE_URL: ${SITE_URL:-http://localhost}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      DJANGO_LOG_TO_FILE: ${DJANGO_LOG_TO_FILE:-true}
      DJANGO_LOG_DIR: /app/logs
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-}
      WHITENOISE_MAX_AGE: ${WHITENOISE_MAX_AGE:-31536000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - agrohub_network

  # ============================================
  # Celery Worker
  # ============================================
  celery-worker:
    image: agrohub-web:latest
    # AQUI ESTÁ A MUDANÇA: Substituimos command por entrypoint
    entrypoint:
      [
        "celery",
        "-A",
        "UniRV_Django",
        "worker",
        "-l",
        "info",
        "--concurrency=2",
      ]
    depends_on:
      - db
      - redis
    volumes:
      - media_data:/app/media
      - logs_data:/app/logs
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agrohub_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-agrohub_production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      DB_NAME: ${DB_NAME:-agrohub_production}
      DB_USER: ${DB_USER:-agrohub_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY: "True"
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@agrohub.unirv.edu.br}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "celery -A UniRV_Django inspect ping --timeout 10 || exit 1",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - agrohub_network

  # ============================================
  # Celery Beat (Periodic Task Scheduler)
  # ============================================
  celery-beat:
    image: agrohub-web:latest
    # AQUI ESTÁ A MUDANÇA: Substituimos command por entrypoint
    entrypoint:
      [
        "celery",
        "-A",
        "UniRV_Django",
        "beat",
        "-l",
        "info",
        "--scheduler",
        "django_celery_beat.schedulers:DatabaseScheduler",
      ]
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agrohub_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-agrohub_production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      DB_NAME: ${DB_NAME:-agrohub_production}
      DB_USER: ${DB_USER:-agrohub_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      USE_CELERY: "True"
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
    networks:
      - agrohub_network

  # ============================================
  # Flower — Celery Monitoring Dashboard
  # ============================================
  flower:
    image: agrohub-web:latest
    # AQUI ESTÁ A MUDANÇA: Substituimos command por entrypoint
    entrypoint:
      [
        "celery",
        "-A",
        "UniRV_Django",
        "flower",
        "--port=5555",
        "--url_prefix=flower",
      ]
    depends_on:
      - redis
    environment:
      DATABASE_URL: postgresql://${DB_USER:-agrohub_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-agrohub_production}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost}
      DB_NAME: ${DB_NAME:-agrohub_production}
      DB_USER: ${DB_USER:-agrohub_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:changeme}
    ports:
      - "5555:5555"
    networks:
      - agrohub_network

# ============================================
# Named Volumes
# ============================================
volumes:
  postgres_data:
    name: agrohub_postgres_data
  redis_data:
    name: agrohub_redis_data
  media_data:
    name: agrohub_media_data
  static_data:
    name: agrohub_static_data
  logs_data:
    name: agrohub_logs_data

# ============================================
# Network
# ============================================
networks:
  agrohub_network:
    name: agrohub_swarm_network
    driver: overlay
    attachable: true
